# Auto Crab - Desktop AI Assistant Configuration
# 桌面 AI 助理配置文件

[general]
language = "zh-CN"          # zh-CN / en-US
theme = "system"            # system / light / dark
first_run = true

# ============================================================
# 模型配置
# 支持: openai / anthropic / dashscope(通义) / deepseek /
#       zhipu(智谱) / moonshot(Kimi) / ollama(本地)
# ============================================================

# 主模型 - 取消注释并填入你的配置
# [models.primary]
# provider = "dashscope"
# model = "qwen-max"
# api_key_ref = "keychain://dashscope"

# 回退模型 - 主模型不可用时自动切换
# [models.fallback]
# provider = "ollama"
# model = "qwen2.5:14b"
# endpoint = "http://localhost:11434"

# 编码专用模型
# [models.coding]
# provider = "deepseek"
# model = "deepseek-coder-v3"
# api_key_ref = "keychain://deepseek"

# 智能路由 - 根据任务类型自动选模型
# [models.routing]
# coding = "deepseek-coder-v3"
# writing = "qwen-max"
# translation = "qwen-max"
# general = "qwen-max"

# ============================================================
# Agent 配置
# ============================================================

[agent]
name = "小蟹"
personality = "professional"   # professional / friendly / concise
max_context_tokens = 128000
system_prompt = "你是 Auto Crab，一个安全、可控的桌面 AI 助理。你的操作需要经过用户审批。"

# ============================================================
# 安全配置 - 默认最高安全级别
# ============================================================

[security]
master_password_required = true
auto_lock_minutes = 15

# 风险等级覆盖 (可选)
# 默认风险分级已内置，这里只需覆盖你想调整的
# [security.risk_overrides]
# execute_shell = "moderate"    # 将 shell 从 dangerous 降为 moderate

# ============================================================
# 工具权限配置
# ============================================================

[tools]
file_access = []              # 文件访问白名单，空=当前工作目录
shell_enabled = true
shell_allowed_commands = ["git", "npm", "pnpm", "python", "cargo", "node"]
network_access = true
network_allowed_domains = []  # 空=允许所有域名

# ============================================================
# 远程控制 (飞书 / 企业微信)
# ============================================================

[remote]
enabled = false

# [remote.feishu]
# app_id = ""
# app_secret_ref = "keychain://feishu-secret"
# poll_interval_secs = 30
# allowed_user_ids = []

# [remote.wechat_work]
# corp_id = ""
# agent_id = ""
# secret_ref = "keychain://wechat-work-secret"
# poll_interval_secs = 30
# allowed_user_ids = []

# ============================================================
# 定时任务 (默认关闭，与 OpenClaw 不同)
# ============================================================

[scheduled_tasks]
enabled = false
require_confirmation = false

# 投资报告 - 每天5次，对应各市场开盘/收盘时段
# 9:35 A股开盘后分析
[[scheduled_tasks.jobs]]
name = "早盘分析报告"
cron = "35 9 * * 1-5"
action = "你是资深投资分析师。请生成今日早盘分析报告。要求：1.综合分析A股（上证/沪深300/创业板）、港股（恒生指数）、加密货币（BTC/ETH）、贵金属（黄金/白银）、原油的实时行情 2.结合最新市场新闻动态 3.给出各板块操作建议 4.标注关键支撑/压力位。格式简洁专业，适合快速阅读。"
auto_execute = true

# 11:50 A股午盘收盘前
[[scheduled_tasks.jobs]]
name = "午盘总结"
cron = "50 11 * * 1-5"
action = "你是资深投资分析师。请生成午盘总结。要求：1.A股上午走势回顾（上证/沪深300/创业板涨跌）2.港股半日表现 3.亚太市场联动分析 4.下午盘操作建议。结合最新消息面变化。"
auto_execute = true

# 14:50 A股尾盘前
[[scheduled_tasks.jobs]]
name = "尾盘预警"
cron = "50 14 * * 1-5"
action = "你是资深投资分析师。请生成尾盘预警报告。要求：1.A股全天走势总结（上证/沪深300/创业板）2.尾盘资金流向分析 3.收盘预判 4.明日展望。结合盘面异动和消息面。"
auto_execute = true

# 15:45 A股收盘后、美股盘前
[[scheduled_tasks.jobs]]
name = "收盘日报"
cron = "45 15 * * 1-5"
action = "你是资深投资分析师。请生成收盘日报。要求：1.A股全天回顾（指数/板块/个股亮点）2.港股收盘情况 3.加密货币（BTC/ETH）日内走势 4.黄金白银原油走势 5.美股盘前信号 6.次日操作策略。全面但简洁。"
auto_execute = true

# 22:30 美股开盘后
[[scheduled_tasks.jobs]]
name = "夜盘分析"
cron = "30 22 * * 1-5"
action = "你是资深投资分析师。请生成夜盘分析报告。要求：1.美股开盘表现（纳指/道指/标普500及重点科技股）2.加密货币（BTC/ETH）实时行情 3.黄金白银原油夜盘走势 4.日经期货走势 5.对次日亚太市场的影响预判。"
auto_execute = true

# 科技圈学习计划 - 每日早晨推送
[[scheduled_tasks.jobs]]
name = "科技日报"
cron = "0 8 * * *"
action = "你是科技领域资深分析师。请生成今日科技圈早报。要求覆盖：1.AI/大模型最新进展（新模型发布、重大研究突破、行业应用）2.加密货币/Web3动态（监管政策、项目进展、市场趋势）3.机器人/自动化技术（人形机器人、工业自动化、自动驾驶）4.值得关注的科技公司动态。每个板块2-3条核心信息，附简评。最后给出1-2条职业发展建议。"
auto_execute = true
